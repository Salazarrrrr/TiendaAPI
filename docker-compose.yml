services:
  db:
    image: postgres:15
    # ... (configuracion previa)

  web_django:  # El Monolito (v1)
    build: .
    command: gunicorn tienda_project.wsgi:application --bind 0.0.0.0:8000
    depends_on:
      - db

  pagos_flask:  # El Microservicio (v2) - EL ESTRANGULADOR
    build: ./microservicio_pagos
    ports:
      - "5000:5000"  # Solo para pruebas iniciales, luego lo cerraremos

  nginx:
    image: nginx:1.25
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web_django
      - pagos_flask